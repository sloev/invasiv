name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/invasiv-base

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Build and Push the Heavy Base (oF Core + Addons)
  # This runs only when the Dockerfile changes, or on manual trigger.
  base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Base Stage
        uses: docker/build-push-action@v5
        with:
          context: .
          target: addons
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Build the Application from the Base
  build:
    needs: base
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Version
        id: version
        run: |
          VERSION="v0.1.${{ github.run_number }}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Application
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder
          load: true
          tags: invasiv-builder:latest
          build-args: |
            VERSION_NAME=${{ steps.version.outputs.VERSION }}
          # This tells docker to try and pull layers from our pre-built base
          cache-from: |
            type=gha
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=gha,mode=max

      - name: Extract Binary from Docker
        run: |
          mkdir -p release
          docker create --name extract invasiv-builder:latest
          docker cp extract:/of/apps/myApps/invasiv/bin/ release/
          docker rm extract
          cd release && tar -czvf ../invasiv-linux-x64.tar.gz .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Invasiv ${{ steps.version.outputs.VERSION }}
          files: invasiv-linux-x64.tar.gz
          body: |
            Rolling release build.
            Version: ${{ steps.version.outputs.VERSION }}
            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
