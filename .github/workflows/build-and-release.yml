name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: invasiv/invasiv-base

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job -1: Check History for unpassed stages
  previous-run:
    runs-on: ubuntu-latest
    outputs:
      skewer_failed: ${{ steps.check.outputs.skewer_failed }}
      invasiv_failed: ${{ steps.check.outputs.invasiv_failed }}
      base_failed: ${{ steps.check.outputs.base_failed }}
    steps:
      - name: Check historical success of stages
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # We check if these stages EVER passed in recent history for this branch.
          # If not, we re-run them.
          
          function check_stage() {
            local stage_name=$1
            # Get last completed run on this branch
            local last_run=$(gh run list --branch ${{ github.ref_name }} --status completed --limit 1 --json databaseId -q ".[0].databaseId")
            
            if [ -z "$last_run" ]; then
              echo "true"
              return
            fi

            local status=$(gh run view $last_run --json jobs --jq ".jobs[] | select(.name == \"$stage_name\") | .conclusion")
            if [ "$status" == "failure" ]; then
              echo "true"
            else
              echo "false"
            fi
          }

          echo "base_failed=$(check_stage "base")" >> $GITHUB_OUTPUT
          echo "skewer_failed=$(check_stage "skewer-native")" >> $GITHUB_OUTPUT
          echo "invasiv_failed=$(check_stage "invasiv-test")" >> $GITHUB_OUTPUT

  # Job 0: Path Filtering
  filter:
    needs: previous-run
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.filter.outputs.base }}
      skewer: ${{ steps.filter.outputs.skewer }}
      invasiv_src: ${{ steps.filter.outputs.invasiv_src }}
      invasiv_tests: ${{ steps.filter.outputs.invasiv_tests }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            base:
              - 'Dockerfile'
              - '.github/workflows/build-and-release.yml'
            skewer:
              - 'skewer/**'
              - '.github/workflows/build-and-release.yml'
            invasiv_src:
              - 'src/**'
              - 'addons.make'
              - 'config.make'
              - 'Makefile'
              - 'Dockerfile'
              - 'resources/**'
              - '.github/workflows/build-and-release.yml'
            invasiv_tests:
              - 'tests/**'
            docs:
              - 'docs/**'
              - '.github/workflows/build-and-release.yml'

  # Job 1: Build the Heavy openFrameworks Base
  base:
    needs: [filter, previous-run]
    if: |
      needs.filter.outputs.base == 'true' || 
      needs.previous-run.outputs.base_failed == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push Base Stage
        uses: docker/build-push-action@v5
        with:
          context: .
          target: addons
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: SKEWER (Native)
  skewer-native:
    needs: [filter, previous-run]
    if: |
      needs.filter.outputs.skewer == 'true' || 
      needs.previous-run.outputs.skewer_failed == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev pkg-config
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "skewer -> target"
      - name: Build
        run: |
          cargo build --release -q > /tmp/cargo.log 2>&1 && echo "Skewer Build: Succeeded" || (echo "Skewer Build: Failed" && cat /tmp/cargo.log && exit 1)
        working-directory: skewer
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: skewer-binary
          path: skewer/target/release/skewer

  # Job 3: SKEWER (WASM)
  skewer-wasm:
    needs: [filter, previous-run]
    if: |
      needs.filter.outputs.skewer == 'true' || 
      needs.previous-run.outputs.skewer_failed == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "skewer -> target"
      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - name: Build WASM
        run: |
          wasm-pack build --target web --out-dir ../docs/skewer_wasm --no-typescript > /tmp/wasm.log 2>&1 && echo "Skewer WASM: Succeeded" || (echo "Skewer WASM: Failed" && cat /tmp/wasm.log && exit 1)
        working-directory: skewer
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: skewer-wasm
          path: docs/skewer_wasm/

  # Job 4: INVASIV (oF) - Build & Test
  invasiv-test:
    needs: [filter, base, previous-run]
    if: |
      needs.filter.outputs.invasiv_src == 'true' || 
      needs.filter.outputs.invasiv_tests == 'true' || 
      needs.previous-run.outputs.invasiv_failed == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Run Tests
        uses: docker/build-push-action@v5
        with:
          context: .
          target: tester
          load: true
          tags: invasiv-tester:latest
          build-args: |
            VERSION_NAME=v0.1.${{ github.run_number }}
            HEADLESS_SUPPORT=1
          cache-from: |
            type=gha
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=gha,mode=max

  # Job 5: INVASIV (oF) - Release Artifacts
  invasiv-release-artifacts:
    needs: [filter, invasiv-test, previous-run]
    if: |
      (needs.filter.outputs.invasiv_src == 'true' || 
       needs.previous-run.outputs.invasiv_failed == 'true' ||
       github.event_name == 'workflow_dispatch') &&
      (needs.invasiv-test.result == 'success' || needs.invasiv-test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate Version
        id: version
        run: echo "VERSION=v0.1.${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: Build AppImage
        uses: docker/build-push-action@v5
        with:
          context: .
          target: bundler
          load: true
          tags: invasiv-bundler:latest
          build-args: |
            VERSION_NAME=${{ steps.version.outputs.VERSION }}
            HEADLESS_SUPPORT=1
          cache-from: |
            type=gha
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      - name: Extract Artifacts
        run: |
          mkdir -p release/raw
          docker create --name ex-b invasiv-bundler:latest
          docker cp ex-b:/of/apps/myApps/invasiv/Invasiv-x86_64.AppImage release/
          docker cp ex-b:/of/apps/myApps/invasiv/bin/invasiv release/raw/
          docker cp ex-b:/of/apps/myApps/invasiv/bin/ release/bin-folder
          docker rm ex-b
          cd release && tar -czvf ../invasiv-linux-x64.tar.gz bin-folder/
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: invasiv-artifacts
          path: release/

  # Job 6: Release SKEWER
  release-skewer:
    needs: [filter, skewer-native]
    if: needs.skewer-native.result == 'success'
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: skewer-binary, path: ./release-skewer-bin }
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: skewer-v0.1.${{ github.run_number }}
          name: SKEWER v0.1.${{ github.run_number }}
          files: release-skewer-bin/skewer
          body: |
            SKEWER Rhythmic Prep Tool.
            Requires INVASIV >= v0.1.0.
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }

  # Job 7: Release INVASIV
  release-invasiv:
    needs: [filter, invasiv-release-artifacts]
    if: needs.invasiv-release-artifacts.result == 'success'
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: invasiv-artifacts, path: ./release }
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: invasiv-v0.1.${{ github.run_number }}
          name: INVASIV v0.1.${{ github.run_number }}
          files: |
            release/Invasiv-x86_64.AppImage
            release/raw/invasiv
            invasiv-linux-x64.tar.gz
          body: |
            INVASIV VJ Engine.
            Requires SKEWER >= v0.1.0 for rhythmic prep.
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }

  # Job 8: Deploy Pages
  deploy-pages:
    needs: [filter, skewer-wasm, previous-run]
    if: |
      needs.filter.outputs.docs == 'true' || 
      needs.filter.outputs.skewer == 'true' || 
      needs.filter.outputs.invasiv_src == 'true' || 
      needs.previous-run.outputs.skewer_failed == 'true' || 
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions: { contents: write, pages: write, id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: skewer-wasm
          path: docs/skewer_wasm/
      - name: Download FFmpeg Assets
        run: |
          mkdir -p docs/lib
          # @ffmpeg/ffmpeg UMD
          curl -sSL https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js -o docs/lib/ffmpeg.js
          curl -sSL https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/814.ffmpeg.js -o docs/lib/814.ffmpeg.js
          # @ffmpeg/util UMD
          curl -sSL https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js -o docs/lib/util.js
          # @ffmpeg/core UMD
          curl -sSL https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js -o docs/lib/ffmpeg-core.js
          curl -sSL https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm -o docs/lib/ffmpeg-core.wasm
      - uses: actions/configure-pages@v4
      - uses: actions/jekyll-build-pages@v1
        with: { source: ./docs, destination: ./_site }
      - uses: actions/upload-pages-artifact@v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
