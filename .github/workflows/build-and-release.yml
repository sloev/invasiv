name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/invasiv-base

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Build and Push the Heavy Base (oF Core + Addons)
  base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes in Base
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            base:
              - 'Dockerfile'
              - '.github/workflows/build-and-release.yml'

      - name: Log in to GHCR
        if: steps.filter.outputs.base == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.filter.outputs.base == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Base Stage
        if: steps.filter.outputs.base == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: addons
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Build the Application, Run Tests, and Bundle
  build:
    needs: base
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Version
        id: version
        run: |
          VERSION="v0.1.${{ github.run_number }}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Application
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder
          load: true
          tags: invasiv-builder:latest
          build-args: |
            VERSION_NAME=${{ steps.version.outputs.VERSION }}
          cache-from: |
            type=gha
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=gha,mode=max

      - name: Run Integration Tests
        uses: docker/build-push-action@v5
        with:
          context: .
          target: tester
          load: true
          cache-from: |
            type=gha
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            VERSION_NAME=${{ steps.version.outputs.VERSION }}

      - name: Build AppImage
        uses: docker/build-push-action@v5
        with:
          context: .
          target: bundler
          load: true
          tags: invasiv-bundler:latest
          cache-from: |
            type=gha
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Extract Artifacts from Docker
        run: |
          mkdir -p release/raw
          
          # Extract raw binary
          docker create --name extract-raw invasiv-builder:latest
          docker cp extract-raw:/of/apps/myApps/invasiv/bin/invasiv release/raw/
          docker rm extract-raw
          
          # Extract AppImage
          docker create --name extract-bundle invasiv-bundler:latest
          docker cp extract-bundle:/of/apps/myApps/invasiv/Invasiv-x86_64.AppImage release/
          docker rm extract-bundle
          
          # Prepare tarball of bin folder (includes data/ and potential libs)
          docker create --name extract-bin invasiv-builder:latest
          docker cp extract-bin:/of/apps/myApps/invasiv/bin/ release/bin-folder
          docker rm extract-bin
          cd release && tar -czvf ../invasiv-linux-x64.tar.gz bin-folder/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Invasiv ${{ steps.version.outputs.VERSION }}
          files: |
            release/Invasiv-x86_64.AppImage
            release/raw/invasiv
            invasiv-linux-x64.tar.gz
          body: |
            Rolling release build.
            Version: ${{ steps.version.outputs.VERSION }}
            Commit: ${{ github.sha }}
            
            Artifacts:
            - **Invasiv-x86_64.AppImage**: Standalone bundle (recommended for most users)
            - **invasiv**: Raw binary (requires libmpv2 installed on host)
            - **invasiv-linux-x64.tar.gz**: Full bin folder including data/ assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
