name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Version
        id: version
        run: |
          VERSION="v0.1.${{ github.run_number }}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Rolling version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Cache Docker Layers
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder
          load: true
          tags: invasiv-builder:latest
          build-args: |
            VERSION_NAME=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Binary from Docker
        run: |
          mkdir -p release
          docker create --name extract invasiv-builder:latest
          docker cp extract:/of/apps/myApps/invasiv/bin/ release/
          docker rm extract
          cd release && tar -czvf ../invasiv-linux-x64.tar.gz .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Invasiv ${{ steps.version.outputs.VERSION }}
          files: invasiv-linux-x64.tar.gz
          body: |
            Rolling release build.
            Version: ${{ steps.version.outputs.VERSION }}
            Commit: ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
