name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/invasiv-base

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Build the Heavy openFrameworks Base
  base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes in Base
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            base:
              - 'Dockerfile'
              - '.github/workflows/build-and-release.yml'

      - name: Log in to GHCR
        if: steps.filter.outputs.base == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.filter.outputs.base == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Base Stage
        if: steps.filter.outputs.base == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: addons
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Build SKEWER (Rust) natively
  skewer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev pkg-config

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workdir: skewer

      - name: Build SKEWER
        run: cargo build --release
        working-directory: skewer

      - name: Upload SKEWER Binary
        uses: actions/upload-artifact@v4
        with:
          name: skewer-binary
          path: skewer/target/release/skewer

  # Job 3: Build Invasiv (oF), Run Tests, and Bundle AppImage
  build:
    needs: base
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Version
        id: version
        run: |
          VERSION="v0.1.${{ github.run_number }}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Application
        uses: docker/build-push-action@v5
        with:
          context: .
          target: builder
          load: true
          tags: invasiv-builder:latest
          build-args: |
            VERSION_NAME=${{ steps.version.outputs.VERSION }}
          cache-from: |
            type=gha
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=gha,mode=max

      - name: Run Integration Tests
        uses: docker/build-push-action@v5
        with:
          context: .
          target: tester
          load: true
          cache-from: |
            type=gha
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            VERSION_NAME=${{ steps.version.outputs.VERSION }}

      - name: Build AppImage
        uses: docker/build-push-action@v5
        with:
          context: .
          target: bundler
          load: true
          tags: invasiv-bundler:latest
          cache-from: |
            type=gha
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: invasiv-appimage
          path: |
            # We still need to extract it from the container image
            # Wait, easier to just extract it in a later step.

      - name: Extract Artifacts from Docker
        run: |
          mkdir -p release/raw
          docker create --name extract-raw invasiv-builder:latest
          docker cp extract-raw:/of/apps/myApps/invasiv/bin/invasiv release/raw/
          docker rm extract-raw
          docker create --name extract-bundle invasiv-bundler:latest
          docker cp extract-bundle:/of/apps/myApps/invasiv/Invasiv-x86_64.AppImage release/
          docker rm extract-bundle
          docker create --name extract-bin invasiv-builder:latest
          docker cp extract-bin:/of/apps/myApps/invasiv/bin/ release/bin-folder
          docker rm extract-bin
          cd release && tar -czvf ../invasiv-linux-x64.tar.gz bin-folder/

      - name: Store Extracted Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: invasiv-build-artifacts
          path: release/

  # Job 4: Release
  release:
    needs: [build, skewer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Invasiv Artifacts
        uses: actions/download-artifact@v4
        with:
          name: invasiv-build-artifacts
          path: release/

      - name: Download SKEWER Artifact
        uses: actions/download-artifact@v4
        with:
          name: skewer-binary
          path: release/raw/

      - name: Generate Version
        id: version
        run: |
          VERSION="v0.1.${{ github.run_number }}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Invasiv ${{ steps.version.outputs.VERSION }}
          files: |
            release/Invasiv-x86_64.AppImage
            release/raw/invasiv
            release/raw/skewer
            invasiv-linux-x64.tar.gz
          body: |
            Rolling release build.
            Version: ${{ steps.version.outputs.VERSION }}
            Commit: ${{ github.sha }}
            
            Artifacts:
            - **Invasiv-x86_64.AppImage**: Standalone bundle (recommended)
            - **invasiv**: Core application raw binary
            - **skewer**: Rhythmic warping utility (Rust)
            - **invasiv-linux-x64.tar.gz**: Full data folder assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
