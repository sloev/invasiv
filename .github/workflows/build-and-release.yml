name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/invasiv-base

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 0: Path Filtering to save build time
  filter:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.filter.outputs.base }}
      skewer: ${{ steps.filter.outputs.skewer }}
      build: ${{ steps.filter.outputs.build }}
      tests: ${{ steps.filter.outputs.tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            base:
              - 'Dockerfile'
              - '.github/workflows/build-and-release.yml'
            skewer:
              - 'skewer/**'
              - '.github/workflows/build-and-release.yml'
            build:
              - 'src/**'
              - 'addons.make'
              - 'config.make'
              - 'Makefile'
              - 'Dockerfile'
              - '.github/workflows/build-and-release.yml'
            tests:
              - 'src/**'
              - 'tests/**'
              - 'Dockerfile'
              - '.github/workflows/build-and-release.yml'

  # Job 1: Build the Heavy openFrameworks Base
  base:
    needs: filter
    if: needs.filter.outputs.base == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Base Stage
        uses: docker/build-push-action@v5
        with:
          context: .
          target: addons
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Build SKEWER (Rust) natively
  skewer:
    needs: filter
    if: needs.filter.outputs.skewer == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev pkg-config

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: skewer

      - name: Build SKEWER
        run: cargo build --release
        working-directory: skewer

      - name: Upload SKEWER Binary
        uses: actions/upload-artifact@v4
        with:
          name: skewer-binary
          path: skewer/target/release/skewer

  # Job 3: Build SKEWER (WASM)
  skewer-wasm:
    needs: filter
    if: needs.filter.outputs.skewer == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: skewer

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build --target web --out-dir ../docs/skewer_wasm --no-typescript
        working-directory: skewer

      - name: Upload WASM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skewer-wasm
          path: docs/skewer_wasm/

  # Job 4: Build Invasiv (oF) and Run Tests
  build:
    needs: [filter, base]
    # We run if either the code or the tests folder changed
    if: always() && (needs.filter.outputs.build == 'true' || needs.filter.outputs.tests == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Version
        id: version
        run: echo "VERSION=v0.1.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build Application & Run Tests
        uses: docker/build-push-action@v5
        with:
          context: .
          target: tester
          load: true
          tags: invasiv-tester:latest
          build-args: |
            VERSION_NAME=${{ steps.version.outputs.VERSION }}
          cache-from: |
            type=gha
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=gha,mode=max

      - name: Build AppImage (only if code changed)
        if: needs.filter.outputs.build == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          target: bundler
          load: true
          tags: invasiv-bundler:latest
          cache-from: |
            type=gha
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Extract Artifacts from Docker
        if: needs.filter.outputs.build == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p release/raw
          docker create --name extract-raw invasiv-tester:latest # tester has the binary
          docker cp extract-raw:/of/apps/myApps/invasiv/bin/invasiv release/raw/
          docker rm extract-raw
          
          docker create --name extract-bundle invasiv-bundler:latest
          docker cp extract-bundle:/of/apps/myApps/invasiv/Invasiv-x86_64.AppImage release/
          docker rm extract-bundle
          
          docker create --name extract-bin invasiv-tester:latest
          docker cp extract-bin:/of/apps/myApps/invasiv/bin/ release/bin-folder
          docker rm extract-bin
          cd release && tar -czvf ../invasiv-linux-x64.tar.gz bin-folder/

      - name: Store Extracted Artifacts
        if: needs.filter.outputs.build == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: invasiv-build-artifacts
          path: release/

  # Job 5: Release & Deploy Pages
  release:
    needs: [filter, build, skewer, skewer-wasm]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Invasiv Artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: invasiv-build-artifacts
          path: release/

      - name: Download SKEWER Artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: skewer-binary
          path: release/raw/

      - name: Download SKEWER WASM
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: skewer-wasm
          path: docs/skewer_wasm/

      - name: Generate Version
        id: version
        run: echo "VERSION=v0.1.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: needs.filter.outputs.build == 'true' || needs.filter.outputs.skewer == 'true'
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Invasiv ${{ steps.version.outputs.VERSION }}
          files: |
            release/Invasiv-x86_64.AppImage
            release/raw/invasiv
            release/raw/skewer
            invasiv-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
