name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/invasiv-base

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 0: Path Filtering
  filter:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.filter.outputs.base }}
      skewer: ${{ steps.filter.outputs.skewer }}
      invasiv: ${{ steps.filter.outputs.invasiv }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            base:
              - 'Dockerfile'
              - '.github/workflows/build-and-release.yml'
            skewer:
              - 'skewer/**'
              - '.github/workflows/build-and-release.yml'
            invasiv:
              - 'src/**'
              - 'addons.make'
              - 'config.make'
              - 'Makefile'
              - 'Dockerfile'
              - 'tests/**'
              - '.github/workflows/build-and-release.yml'
            docs:
              - 'docs/**'
              - '.github/workflows/build-and-release.yml'

  # Job 1: Build the Heavy openFrameworks Base
  base:
    needs: filter
    if: needs.filter.outputs.base == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push Base Stage
        uses: docker/build-push-action@v5
        with:
          context: .
          target: addons
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: SKEWER (Native)
  skewer-native:
    needs: filter
    if: needs.filter.outputs.skewer == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev pkg-config
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "skewer -> target"
      - name: Build
        run: cargo build --release
        working-directory: skewer
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: skewer-binary
          path: skewer/target/release/skewer

  # Job 3: SKEWER (WASM)
  skewer-wasm:
    needs: filter
    if: needs.filter.outputs.skewer == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "skewer -> target"
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build --target web --out-dir ../docs/skewer_wasm --no-typescript
        working-directory: skewer
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: skewer-wasm
          path: docs/skewer_wasm/

  # Job 4: INVASIV (oF)
  invasiv:
    needs: [filter, base]
    if: always() && (needs.filter.outputs.invasiv == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Generate Version
        id: version
        run: echo "VERSION=v0.1.${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: Build and Test
        uses: docker/build-push-action@v5
        with:
          context: .
          target: tester
          load: true
          tags: invasiv-tester:latest
          build-args: |
            VERSION_NAME=${{ steps.version.outputs.VERSION }}
            HEADLESS_SUPPORT=1
          cache-from: |
            type=gha
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=gha,mode=max
      - name: Build AppImage
        uses: docker/build-push-action@v5
        with:
          context: .
          target: bundler
          load: true
          tags: invasiv-bundler:latest
          cache-from: |
            type=gha
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
      - name: Extract Artifacts
        run: |
          mkdir -p release/raw
          docker create --name ex-t invasiv-tester:latest
          docker cp ex-t:/of/apps/myApps/invasiv/bin/invasiv release/raw/
          docker rm ex-t
          docker create --name ex-b invasiv-bundler:latest
          docker cp ex-b:/of/apps/myApps/invasiv/Invasiv-x86_64.AppImage release/
          docker rm ex-b
          docker create --name ex-d invasiv-tester:latest
          docker cp ex-d:/of/apps/myApps/invasiv/bin/ release/bin-folder
          docker rm ex-d
          cd release && tar -czvf ../invasiv-linux-x64.tar.gz bin-folder/
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: invasiv-artifacts
          path: release/

  # Job 5: Release SKEWER
  release-skewer:
    needs: [filter, skewer-native]
    if: needs.filter.outputs.skewer == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: skewer-binary
          path: ./
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: skewer-v0.1.${{ github.run_number }}
          name: SKEWER v0.1.${{ github.run_number }}
          files: skewer
          body: |
            SKEWER Rhythmic Prep Tool.
            Requires INVASIV >= v0.1.0.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 6: Release INVASIV
  release-invasiv:
    needs: [filter, invasiv]
    if: needs.filter.outputs.invasiv == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: invasiv-artifacts
          path: ./release
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: invasiv-v0.1.${{ github.run_number }}
          name: INVASIV v0.1.${{ github.run_number }}
          files: |
            release/Invasiv-x86_64.AppImage
            release/raw/invasiv
            invasiv-linux-x64.tar.gz
          body: |
            INVASIV VJ Engine.
            Requires SKEWER >= v0.1.0 for rhythmic prep.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 7: Deploy Pages
  deploy-pages:
    needs: [filter, skewer-wasm, release-skewer, release-invasiv]
    # Run if docs changed, or if we released new versions of either tool
    if: always() && !cancelled() && (needs.filter.outputs.docs == 'true' || needs.filter.outputs.skewer == 'true' || needs.filter.outputs.invasiv == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: skewer-wasm
          path: docs/skewer_wasm/
      - uses: actions/configure-pages@v4
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
